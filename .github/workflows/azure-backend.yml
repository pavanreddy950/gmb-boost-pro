name: Deploy Backend to Azure App Service (Docker)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/azure-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: "YOUR_CLIENT_ID_HERE"
        tenant-id: "YOUR_TENANT_ID_HERE"
        subscription-id: "YOUR_SUBSCRIPTION_ID_HERE"
        client-secret: "YOUR_CLIENT_SECRET_HERE"
        
    - name: Build Docker image
      run: |
        cd server
        docker build -t scale12345-hccmcmf7g3bwbvd0:${{ github.sha }} .
        
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: scale12345.azurecr.io
        username: "YOUR_ACR_USERNAME_HERE"
        password: "YOUR_ACR_PASSWORD_HERE"
        
    - name: Push Docker image to ACR
      run: |
        docker tag scale12345-hccmcmf7g3bwbvd0:${{ github.sha }} scale12345.azurecr.io/scale12345-hccmcmf7g3bwbvd0:${{ github.sha }}
        docker tag scale12345-hccmcmf7g3bwbvd0:${{ github.sha }} scale12345.azurecr.io/scale12345-hccmcmf7g3bwbvd0:latest
        docker push scale12345.azurecr.io/scale12345-hccmcmf7g3bwbvd0:${{ github.sha }}
        docker push scale12345.azurecr.io/scale12345-hccmcmf7g3bwbvd0:latest
        
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'scale12345-hccmcmf7g3bwbvd0'
        slot-name: 'Production'
        images: 'scale12345.azurecr.io/scale12345-hccmcmf7g3bwbvd0:${{ github.sha }}'