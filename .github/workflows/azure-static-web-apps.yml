name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        env:
          VITE_BACKEND_URL: https://scale12345-hccmcmf7g3bwbvd0.canadacentral-01.azurewebsites.net
          VITE_GOOGLE_CLIENT_ID: 52772597205-9ogv54i6sfvucse3jrqj1nl1hlkspcv1.apps.googleusercontent.com
          VITE_FIREBASE_API_KEY: AIzaSyCwe2lgsK5rhHePnsVgNflZf68M35qm3wU
          VITE_FIREBASE_AUTH_DOMAIN: gbp-467810-a56e2.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: gbp-467810-a56e2
          VITE_FIREBASE_STORAGE_BUCKET: gbp-467810-a56e2.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 1027867101
          VITE_FIREBASE_APP_ID: 1:1027867101:web:e5a55b106f9238eb72b634
          VITE_RAZORPAY_KEY_ID: rzp_live_RFSzT9EvJ2cwJI
          VITE_AZURE_OPENAI_ENDPOINT: https://agentplus.openai.azure.com/
          VITE_AZURE_OPENAI_DEPLOYMENT: gpt-4o
          VITE_AZURE_OPENAI_KEY: 1TPW16ifwPJccSiQPSHq63nU7IcT6R9DrduIHBYwCm5jbUWiSbkLJQQJ99BDACYeBjFXJ3w3AAABACOG3Yia
          VITE_AZURE_OPENAI_API_VERSION: 2024-02-15-preview
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_08EC8C90F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_08EC8C90F }}
          action: "close"